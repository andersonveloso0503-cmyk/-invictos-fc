    if(!snap.exists()){redirect('');return;}
    const g=snap.data();

    const title='🦁 Invictos FC vs '+g.opponent+' — Confirme sua presença!';
    const desc=(g.date?'📅 '+fmtDate(g.date):'')+(g.time?' · 🕐 '+g.time+'h':'')+(g.location?' · 📍 '+g.location:'');
    const confirmUrl='https://andersonveloso0503-cmyk.github.io/-invictos-fc/confirmar.html?jogo='+gameId;

    document.getElementById('page-title').textContent=title;
    document.getElementById('og-title').content=title;
    document.getElementById('og-desc').content=desc;
    document.getElementById('og-url').content=confirmUrl;

    // Usa ogImage salvo pelo admin (URL do Imgur) ou tenta gerar
    if(g.ogImage){
      document.getElementById('og-image').content=g.ogImage;
    }else if(g.logoAdversario){
      document.getElementById('og-image').content=g.logoAdversario;
    }

    // Redireciona para confirmar.html
    setTimeout(()=>{window.location.href=confirmUrl;},800);
  }catch(e){
    redirect('');
  }
}

async function gerarImagem(opp, logoUrl, date, time){
  const canvas=document.getElementById('matchCanvas');
  const ctx=canvas.getContext('2d');
  const W=1200, H=630;

  // Fundo gradiente
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#1a0302');
  bg.addColorStop(0.5,'#0A0604');
  bg.addColorStop(1,'#020a1a');
  ctx.fillStyle=bg;
  ctx.fillRect(0,0,W,H);

  // Linha dourada topo
  const grad=ctx.createLinearGradient(0,0,W,0);
  grad.addColorStop(0,'transparent');
  grad.addColorStop(0.3,'#C9A84C');
  grad.addColorStop(0.7,'#C9A84C');
  grad.addColorStop(1,'transparent');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,4);

  // Linha dourada base
  ctx.fillRect(0,H-4,W,4);

  // Texto VS central
  ctx.font='bold 100px serif';
  ctx.fillStyle='#C9A84C';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('×',W/2,H/2-20);

  // Data e hora
  if(date||time){
    ctx.font='24px sans-serif';
    ctx.fillStyle='rgba(245,230,200,0.7)';
    const dt=(date?fmtDate(date):'')+(time?' · '+time+'h':'');
    ctx.fillText(dt,W/2,H/2+70);
  }

  // Nome Invictos
  ctx.font='bold 32px sans-serif';
  ctx.fillStyle='#F0C040';
  ctx.textAlign='center';
  ctx.fillText('INVICTOS FC',W*0.25,H-80);

  // Nome adversário
  ctx.fillText(opp.toUpperCase(),W*0.75,H-80);

  // Logo Invictos (esquerda)
  await desenharLogo(ctx, LOGO_INVICTOS, W*0.25-90, H/2-110, 180, 180, true);

  // Logo adversário (direita)
  if(logoUrl){
    try{
      await desenharLogoUrl(ctx, logoUrl, W*0.75-90, H/2-110, 180, 180);
    }catch(e){
      desenharPlaceholder(ctx, opp, W*0.75-90, H/2-110, 180, 180);
    }
  }else{
    desenharPlaceholder(ctx, opp, W*0.75-90, H/2-110, 180, 180);
  }

  return canvas.toDataURL('image/jpeg',0.92);
}

async function desenharLogo(ctx, src, x, y, w, h, border){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      ctx.save();
      ctx.beginPath();
      roundRect(ctx,x,y,w,h,16);
      ctx.clip();
      ctx.drawImage(img,x,y,w,h);
      ctx.restore();
      if(border){
        ctx.strokeStyle='#C9A84C';
        ctx.lineWidth=3;
        ctx.beginPath();
        roundRect(ctx,x,y,w,h,16);
        ctx.stroke();
      }
      resolve();
    };
    img.onerror=resolve;
    img.src=src;
  });
}

async function desenharLogoUrl(ctx, url, x, y, w, h){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>{
      ctx.save();
      ctx.beginPath();
      roundRect(ctx,x,y,w,h,16);
      ctx.clip();
      ctx.drawImage(img,x,y,w,h);
      ctx.restore();
      ctx.strokeStyle='rgba(255,255,255,0.3)';
      ctx.lineWidth=2;
      ctx.beginPath();
      roundRect(ctx,x,y,w,h,16);
      ctx.stroke();
      resolve();
    };
    img.onerror=reject;
    img.src=url;
  });
}

function desenharPlaceholder(ctx, text, x, y, w, h){
  ctx.fillStyle='rgba(30,16,8,0.8)';
  ctx.beginPath();
  roundRect(ctx,x,y,w,h,16);
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.2)';
  ctx.lineWidth=2;
  ctx.stroke();
  ctx.font='bold 48px sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(text.charAt(0).toUpperCase(),x+w/2,y+h/2);
}

function roundRect(ctx,x,y,w,h,r){
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function redirect(url){window.location.href=url||'https://andersonveloso0503-cmyk.github.io/-invictos-fc/confirmar.html';}

init();
