<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#8B1A1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Invictos FC">
<title>Invictos FC · Confirmar Presença</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--cr:#8B1A1A;--crd:#5C0E0E;--g:#C9A84C;--gb:#F0C040;--gd:#8B6914;--bg:#0A0604;--s:#130A04;--s2:#1E1008;--t:#F5E6C8;--tm:#9A8060;--br:rgba(201,168,76,0.2)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;overflow-x:hidden}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;background:radial-gradient(ellipse at center,#1a0a04,#0A0604);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s,transform .8s}
#splash.hide{opacity:0;transform:scale(1.05);pointer-events:none}
.spl-logo{width:100px;height:100px;border-radius:14px;border:3px solid var(--g);display:flex;align-items:center;justify-content:center;font-size:48px;animation:pglow 2s ease-in-out infinite;background:#1a0a04}
.spl-title{font-family:'Cinzel',serif;font-size:1.8rem;font-weight:900;color:var(--gb);letter-spacing:4px;margin-top:14px}
.spl-sub{font-size:.78rem;color:var(--tm);letter-spacing:4px;margin-top:4px}
.spl-bar{width:140px;height:3px;background:var(--s2);border-radius:2px;margin-top:24px;overflow:hidden}
.spl-prog{height:100%;background:linear-gradient(90deg,var(--gd),var(--gb));animation:lbar 2s ease forwards}
@keyframes lbar{from{width:0}to{width:100%}}
@keyframes pglow{0%,100%{box-shadow:0 0 40px rgba(201,168,76,.5)}50%{box-shadow:0 0 70px rgba(201,168,76,.8)}}

/* HEADER */
header{background:rgba(10,6,4,.97);border-bottom:1px solid var(--br);backdrop-filter:blur(12px);display:flex;align-items:center;padding:10px 14px;gap:10px;position:sticky;top:0;z-index:100}
.hl{font-size:28px;width:38px;height:38px;border-radius:8px;border:2px solid var(--g);display:flex;align-items:center;justify-content:center;background:#1a0a04;flex-shrink:0}
.ht{font-family:'Cinzel',serif;font-size:.9rem;font-weight:700;color:var(--gb);letter-spacing:2px}
.hs{font-size:.58rem;color:var(--tm);letter-spacing:2px}

/* CONTEÚDO */
.page{padding:14px 13px 40px}

/* JOGO CARD */
.game-hero{background:linear-gradient(135deg,rgba(139,26,26,.5),rgba(92,14,14,.4));border:1px solid rgba(139,26,26,.7);border-radius:13px;padding:14px;margin-bottom:14px;position:relative;overflow:hidden}
.game-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cr),var(--gd),var(--cr))}
.game-lbl{font-size:.6rem;color:var(--g);letter-spacing:3px;margin-bottom:8px}
.game-teams{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.game-team{font-family:'Cinzel',serif;font-size:1rem;font-weight:700;color:var(--t)}
.game-vs{background:var(--g);color:var(--bg);font-weight:900;font-size:.65rem;padding:3px 10px;border-radius:20px}
.game-infos{display:flex;gap:10px;flex-wrap:wrap}
.game-info{font-size:.72rem;color:var(--tm)}

/* TAB */
.tab-bar{display:flex;gap:5px;background:var(--s);border:1px solid var(--br);border-radius:10px;padding:4px;margin-bottom:12px}
.tab-btn{flex:1;padding:8px 4px;background:none;border:none;border-radius:7px;cursor:pointer;font-family:'Cinzel',serif;font-size:.68rem;font-weight:700;color:var(--tm);letter-spacing:1px;transition:all .2s}
.tab-btn.active{background:var(--cr);color:var(--gb)}

/* SECAO */
.sh{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sh h2{font-family:'Cinzel',serif;font-size:.85rem;color:var(--gb);letter-spacing:2px;white-space:nowrap}
.sl{flex:1;height:1px;background:linear-gradient(90deg,var(--gd),transparent)}

/* JOGADORES */
.player-item{display:flex;align-items:center;gap:10px;background:var(--s);border:1px solid var(--br);border-radius:9px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .2s}
.player-item:active{transform:scale(.98)}
.player-item.selected{border-color:#4ADE80;background:rgba(74,222,128,.08)}
.player-item.cancelled{border-color:#F87171;background:rgba(239,68,68,.07);opacity:.65;cursor:default}
.player-item.already-conf{border-color:#4ADE80;background:rgba(74,222,128,.06);opacity:.7;cursor:default}
.player-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--crd),var(--cr));border:2px solid rgba(201,168,76,.4);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden}
.player-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.player-info{flex:1}
.player-name{font-size:.9rem;font-weight:700;color:var(--t)}
.player-pos{font-size:.58rem;color:var(--tm);letter-spacing:1px;text-transform:uppercase}
.player-status{font-size:1.1rem}

/* CONFIRMADOS */
.conf-box{display:flex;align-items:center;gap:10px;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.3);border-radius:9px;padding:10px 12px;margin-bottom:10px}
.conf-num{font-family:'Cinzel',serif;font-size:1.6rem;font-weight:900;color:#4ADE80;line-height:1}
.conf-lbl{font-size:.6rem;color:var(--tm);letter-spacing:1px;text-transform:uppercase}
.conf-chip{display:inline-flex;align-items:center;gap:4px;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);border-radius:20px;padding:4px 9px;font-size:.7rem;color:#4ADE80;margin:2px}
.conf-chip.guest{background:rgba(224,64,251,.1);border-color:rgba(224,64,251,.3);color:#E040FB}
.conf-chip.absent{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.25);color:#F87171}

/* CONVIDADO */
.fi{width:100%;padding:11px 12px;background:var(--s2);border:1px solid var(--br);border-radius:8px;color:var(--t);font-family:'Rajdhani',sans-serif;font-size:.9rem;outline:none;margin-bottom:8px}
.fi:focus{border-color:var(--gd)}

/* BOTOES */
.btn-confirm{width:100%;padding:13px;background:linear-gradient(135deg,#25D366,#128C7E);border:none;border-radius:10px;color:#fff;font-family:'Cinzel',serif;font-size:.82rem;font-weight:700;letter-spacing:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:8px}
.btn-confirm:active{opacity:.85}
.btn-cancel-pres{width:100%;padding:11px;background:none;border:1px solid rgba(239,68,68,.4);border-radius:10px;color:#F87171;font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:700;letter-spacing:1px;cursor:pointer}
.btn-cancel-pres:active{opacity:.8}

/* TOAST */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);background:linear-gradient(135deg,var(--cr),var(--crd));border:1px solid var(--gd);color:var(--gb);padding:9px 18px;border-radius:30px;font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:1px;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ERRO */
.error-box{text-align:center;padding:40px 20px;color:var(--tm)}
.error-box .ei{font-size:3rem;margin-bottom:12px;opacity:.4}
.error-box p{font-size:.85rem;letter-spacing:1px}

/* ENCERRADO */
.encerrado-badge{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 14px;font-size:.75rem;color:#F87171;text-align:center;margin-bottom:12px;letter-spacing:1px}
</style>
</head>
<body>

<div id="splash">
  <div class="spl-logo">🦁</div>
  <div class="spl-title">INVICTOS FC</div>
  <div class="spl-sub">CONFIRMAR PRESENÇA</div>
  <div class="spl-bar"><div class="spl-prog"></div></div>
</div>

<div class="toast" id="toast"></div>

<header>
  <div class="hl">🦁</div>
  <div><div class="ht">INVICTOS FC</div><div class="hs">CONFIRMAR PRESENÇA</div></div>
</header>

<div class="page" id="mainPage" style="display:none"></div>
<div class="page" id="errorPage" style="display:none">
  <div class="error-box">
    <div class="ei">❌</div>
    <p id="errorMsg">Jogo não encontrado.</p>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,doc,getDoc,setDoc,deleteDoc,onSnapshot,collection}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyD1mZByKu8_M1YYsL7ILbEQvDzMWRry_Z8",
  authDomain:"invictos-fc.firebaseapp.com",
  projectId:"invictos-fc",
  storageBucket:"invictos-fc.firebasestorage.app",
  messagingSenderId:"574008215295",
  appId:"1:574008215295:web:12ef89cd87d6d5a2192eca"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const WA_GROUP='https://chat.whatsapp.com/HnVzicypPW96beA2qOco7F';

let gameId=null;
let gameData=null;
let players=[];
let confirmed=[];
let absent=[];
let guests=[];
let selectedPlayerId=null;
let currentTab='jogador';

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

function fmtDate(d){
  if(!d)return'';
  const[y,m,day]=d.split('-');
  return day+'/'+m+'/'+y;
}

function getParams(){
  const p=new URLSearchParams(window.location.search);
  return p.get('jogo');
}

async function init(){
  gameId=getParams();
  if(!gameId){showError('Link inválido. Solicite um novo link ao admin.');return;}

  try{
    const snap=await getDoc(doc(db,'games',gameId));
    if(!snap.exists()){showError('Jogo não encontrado.');return;}
    gameData=snap.data();

  }catch(e){}

  // Listeners em tempo real
  onSnapshot(collection(db,'players'),snap=>{
    players=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderPage();
  });

  onSnapshot(collection(db,'confirmed'),snap=>{
    confirmed=snap.docs.map(d=>d.id);
    updateLista();
  });

  onSnapshot(collection(db,'absent'),snap=>{
    absent=snap.docs.map(d=>d.id);
    updateLista();
  });

  onSnapshot(collection(db,'guests'),snap=>{
    guests=snap.docs.map(d=>({id:d.id,...d.data()})).filter(g=>g.gameId===gameId);
    updateLista();
  });
}

function showError(msg){
  document.getElementById('errorMsg').textContent=msg;
  document.getElementById('errorPage').style.display='block';
}

function renderPage(){
  const page=document.getElementById('mainPage');
  page.style.display='block';

  const isEncerrado=gameData.status!=='agendado';

  page.innerHTML=`
    <!-- CARD DO JOGO -->
    <div class="game-hero">
      <div class="game-lbl">⚡ JOGO</div>
      <div class="game-teams">
        <div class="game-team">Invictos FC</div>
        <div class="game-vs">VS</div>
        <div class="game-team" style="text-align:right">${gameData.opponent||'?'}</div>
      </div>
      <div class="game-infos">
        ${gameData.date?`<span class="game-info">📅 ${fmtDate(gameData.date)}</span>`:''}
        ${gameData.time?`<span class="game-info">🕐 ${gameData.time}</span>`:''}
        ${gameData.location?`<span class="game-info">📍 ${gameData.location}</span>`:''}
      </div>
    </div>

    ${isEncerrado?`<div class="encerrado-badge">⛔ Este jogo já foi encerrado. Confirmações desativadas.</div>`:''}

    <!-- TABS -->
    ${!isEncerrado?`
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-btn-jogador" onclick="switchTab('jogador')">👤 SOU JOGADOR</button>
      <button class="tab-btn" id="tab-btn-convidado" onclick="switchTab('convidado')">🎟️ CONVIDADO</button>
    </div>`:''} 

    <!-- TAB JOGADOR -->
    <div id="tab-jogador-content">
      <div class="sh"><h2>ESCOLHA SEU NOME</h2><div class="sl"></div></div>
      <div id="player-list">
        ${players.map(p=>{
          const av=p.photo?`<img src="${p.photo}" alt="">`:(p.emoji||'⚽');
          const isConf=confirmed.includes(p.id);
          const isAbs=absent.includes(p.id);
          let cls='',status='⭕',title='';
          if(isConf){cls='already-conf';status='✅';title='Já confirmado';}
          else if(isAbs){cls='cancelled';status='❌';title='Ausente';}
          return`<div class="player-item ${cls}" onclick="selectPlayer('${p.id}')" title="${title}">
            <div class="player-avatar">${av}</div>
            <div class="player-info">
              <div class="player-name">${p.nick||p.name}</div>
              <div class="player-pos">${p.pos||'—'}</div>
            </div>
            <div class="player-status">${status}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- TAB CONVIDADO -->
    <div id="tab-convidado-content" style="display:none">
      <div class="sh"><h2>SEUS DADOS</h2><div class="sl"></div></div>
      <input class="fi" id="guest-name" placeholder="Seu nome completo">
      <input class="fi" id="guest-pos" placeholder="Posição (ex: Atacante)">
    </div>

    <!-- LISTA CONFIRMADOS -->
    <div style="margin-top:14px">
      <div class="sh"><h2>LISTA DO JOGO</h2><div class="sl"></div></div>
      <div class="conf-box">
        <div>
          <div class="conf-num" id="conf-num">0</div>
          <div class="conf-lbl">CONFIRMADOS</div>
        </div>
        <div style="font-size:1.5rem;margin-left:auto">⚽</div>
      </div>
      <div id="chips-wrap"></div>
    </div>

    <!-- BOTOES -->
    ${!isEncerrado?`
    <div style="margin-top:18px">
      <button class="btn-confirm" onclick="confirmar()"><span>📲</span> CONFIRMAR E AVISAR NO WHATSAPP</button>
      <button class="btn-cancel-pres" onclick="cancelar()">❌ CANCELAR MINHA PRESENÇA</button>
    </div>`:``}
  `;

  updateLista();
}

function updateLista(){
  const numEl=document.getElementById('conf-num');
  const chipsEl=document.getElementById('chips-wrap');
  if(!numEl||!chipsEl)return;

  const confPlayers=players.filter(p=>confirmed.includes(p.id));
  const absentPlayers=players.filter(p=>absent.includes(p.id));
  const total=confPlayers.length+guests.length;

  numEl.textContent=total;

  chipsEl.innerHTML=
    confPlayers.map(p=>`<div class="conf-chip">✅ ${p.nick||p.name.split(' ')[0]}</div>`).join('')+
    guests.map(g=>`<div class="conf-chip guest">🎟️ ${g.name}</div>`).join('')+
    absentPlayers.map(p=>`<div class="conf-chip absent">❌ ${p.nick||p.name.split(' ')[0]}</div>`).join('');

  // atualiza ícones na lista de jogadores
  players.forEach(p=>{
    const items=document.querySelectorAll('.player-item');
    items.forEach(item=>{
      const nameEl=item.querySelector('.player-name');
      if(!nameEl)return;
      const pName=p.nick||p.name;
      if(nameEl.textContent===pName){
        const statusEl=item.querySelector('.player-status');
        if(confirmed.includes(p.id)){
          item.className='player-item already-conf';
          if(statusEl)statusEl.textContent='✅';
        }else if(absent.includes(p.id)){
          item.className='player-item cancelled';
          if(statusEl)statusEl.textContent='❌';
        }else{
          item.className='player-item';
          if(statusEl)statusEl.textContent='⭕';
        }
      }
    });
  });
}

window.switchTab=function(tab){
  currentTab=tab;
  ['jogador','convidado'].forEach(t=>{
    const btn=document.getElementById('tab-btn-'+t);
    const content=document.getElementById('tab-'+t+'-content');
    if(btn)btn.classList.toggle('active',t===tab);
    if(content)content.style.display=t===tab?'block':'none';
  });
};

window.selectPlayer=function(pid){
  const p=players.find(x=>x.id===pid);
  if(!p)return;
  if(absent.includes(pid)){showToast('Você cancelou. Toque em Confirmar para voltar!');selectedPlayerId=pid;return;}
  if(confirmed.includes(pid)){showToast(p.nick||p.name+' já está confirmado!');return;}
  selectedPlayerId=pid;
  document.querySelectorAll('.player-item').forEach(item=>{
    const nameEl=item.querySelector('.player-name');
    if(!nameEl)return;
    const pName=p.nick||p.name;
    if(nameEl.textContent===pName&&!confirmed.includes(pid)&&!absent.includes(pid)){
      item.classList.add('selected');
      item.querySelector('.player-status').textContent='👆';
    }else if(!confirmed.includes(pid)&&!absent.includes(pid)){
      item.classList.remove('selected');
      const pp=players.find(x=>(x.nick||x.name)===nameEl.textContent);
      if(pp&&!confirmed.includes(pp.id)&&!absent.includes(pp.id))
        item.querySelector('.player-status').textContent='⭕';
    }
  });
  showToast('Selecionado: '+(p.nick||p.name)+' — agora confirme!');
};

window.confirmar=async function(){
  if(currentTab==='jogador'){
    if(!selectedPlayerId){showToast('Escolha seu nome primeiro!');return;}
    const p=players.find(x=>x.id===selectedPlayerId);if(!p)return;
    try{
      await deleteDoc(doc(db,'absent',selectedPlayerId));
      await setDoc(doc(db,'confirmed',selectedPlayerId),{id:selectedPlayerId});
      showToast('✅ '+(p.nick||p.name)+' confirmado!');
      const confPlayers=players.filter(x=>confirmed.includes(x.id));
      const nomes=confPlayers.map(x=>x.nick||x.name.split(' ')[0]).join(', ');
      const total=confPlayers.length+guests.length+1;
      const msg=
        '✅ *'+(p.nick||p.name)+' confirmou presença!*\n\n'+
        '⚽ *Invictos FC vs '+gameData.opponent+'*\n'+
        (gameData.date?'📅 '+fmtDate(gameData.date):'')+(gameData.time?' · 🕐 '+gameData.time:'')+'\n'+
        (gameData.location?'📍 '+gameData.location+'\n':'')+
        '\n👥 *Confirmados ('+total+'):* '+(nomes?nomes+', '+(p.nick||p.name):(p.nick||p.name))+'\n\n'+
        '🔗 Confirme sua presença:\nhttps://andersonveloso0503-cmyk.github.io/-invictos-fc/confirmar.html?jogo='+gameId+'\n\n'+
        '🦁 _Invictos FC — Nunca Rendidos!_';
      setTimeout(()=>window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank'),500);
    }catch(e){showToast('Erro! Tente novamente.');}
  }else{
    const nome=document.getElementById('guest-name').value.trim();
    const pos=document.getElementById('guest-pos').value.trim();
    if(!nome){showToast('Digite seu nome!');return;}
    try{
      const id='guest_'+Date.now();
      await setDoc(doc(db,'guests',id),{id,gameId,name:nome,pos,createdAt:Date.now()});
      showToast('🎟️ '+nome+' confirmado como convidado!');
      document.getElementById('guest-name').value='';
      document.getElementById('guest-pos').value='';
      const total=confirmed.length+guests.length+1;
      const msg=
        '🎟️ *'+nome+(pos?' ('+pos+')':' (convidado)')+' confirmou presença!*\n\n'+
        '⚽ *Invictos FC vs '+gameData.opponent+'*\n'+
        (gameData.date?'📅 '+fmtDate(gameData.date):'')+(gameData.time?' · 🕐 '+gameData.time:'')+'\n'+
        (gameData.location?'📍 '+gameData.location+'\n':'')+
        '\n👥 *Total confirmados: '+total+'*\n\n'+
        '🔗 Confirme sua presença:\nhttps://andersonveloso0503-cmyk.github.io/-invictos-fc/confirmar.html?jogo='+gameId+'\n\n'+
        '🦁 _Invictos FC — Nunca Rendidos!_';
      setTimeout(()=>window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank'),500);
    }catch(e){showToast('Erro! Tente novamente.');}
  }
};

window.cancelar=async function(){
  if(currentTab==='jogador'){
    if(!selectedPlayerId){showToast('Escolha seu nome primeiro!');return;}
    const p=players.find(x=>x.id===selectedPlayerId);if(!p)return;
    if(!confirm('Cancelar presença de '+(p.nick||p.name)+'?'))return;
    try{
      await deleteDoc(doc(db,'confirmed',selectedPlayerId));
      await setDoc(doc(db,'absent',selectedPlayerId),{id:selectedPlayerId});
      showToast('❌ Presença cancelada.');
      const msg=
        '❌ *'+(p.nick||p.name)+' cancelou a presença.*\n\n'+
        '⚽ Invictos FC vs '+gameData.opponent+'\n'+
        (gameData.date?'📅 '+fmtDate(gameData.date):'')+'\n\n'+
        '🦁 _Invictos FC_';
      setTimeout(()=>window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank'),500);
    }catch(e){showToast('Erro!');}
  }else{
    showToast('Selecione seu nome na aba Jogador para cancelar.');
  }
};

// splash
setTimeout(()=>{
  document.getElementById('splash').classList.add('hide');
  setTimeout(()=>document.getElementById('splash').remove(),800);
},2000);

init();
</script>
</body>
</html>
